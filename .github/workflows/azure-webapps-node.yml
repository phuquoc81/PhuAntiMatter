# This workflow will build and push a node.js application to an Azure Web App when a commit is pushed to your default branch.
#
# This workflow assumes you have already created the target Azure App Service web app.
# For instructions see https://docs.microsoft.com/en-us/azure/app-service/quickstart-nodejs?tabs=linux&pivots=development-environment-cli
#
# To configure this workflow:
#
# 1. Download the Publish Profile for your Azure Web App. You can download this file from the Overview page of your Web App in the Azure Portal.
#    For more information: https://docs.microsoft.com/en-us/azure/app-service/deploy-github-actions?tabs=applevel#generate-deployment-credentials
#
# 2. Create a secret in your repository named AZURE_WEBAPP_PUBLISH_PROFILE, paste the publish profile contents as the value of the secret.
#    For instructions on obtaining the publish profile see: https://docs.microsoft.com/azure/app-service/deploy-github-actions#configure-the-github-secret
#
# 3. Change the value for the AZURE_WEBAPP_NAME. Optionally, change the AZURE_WEBAPP_PACKAGE_PATH and NODE_VERSION environment variables below.
#
# For more information on GitHub Actions for Azure: https://github.com/Azure/Actions
# For more information on the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# For more samples to get started with GitHub Action workflows to deploy to Azure: https://github.com/Azure/actions-workflow-samples

on:
  push:
    branches: [ "main", "copilot/**" ]  # run on copilot branches so branch-scoped workflow badges can update
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: ''               # set this before enabling main-branch Azure Web App deployments
  AZURE_WEBAPP_PACKAGE_PATH: '.'      # set this to the path to your web app project, defaults to the repository root
  NODE_VERSION: '20.x'                # set this to the node version to use

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: npm install, build, and test
      if: ${{ hashFiles('package.json') != '' }}
      run: |
        if [ -f package.json ]; then
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          npm run build --if-present
          npm run test --if-present
        else
          echo "No package.json found; skipping Node.js build and test steps."
        fi

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: node-app
        path: .

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Check Azure deployment configuration
      id: azure-deploy-config
      env:
        AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      run: |
        if [ "${GITHUB_REF}" = "refs/heads/main" ] && [ -n "${AZURE_WEBAPP_NAME}" ] && [ -n "${AZURE_WEBAPP_PUBLISH_PROFILE}" ]; then
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
        else
          echo "should_deploy=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Download artifact from build job
      if: ${{ steps.azure-deploy-config.outputs.should_deploy == 'true' }}
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: Deploy to Azure WebApp
      id: deploy-to-webapp
      if: ${{ steps.azure-deploy-config.outputs.should_deploy == 'true' }}
      env:
        AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      run: |
        python - <<'PY'
        import os
        import pathlib
        import urllib.parse
        import xml.etree.ElementTree as ET
        import zipfile

        root = ET.fromstring(os.environ["AZURE_WEBAPP_PUBLISH_PROFILE"])
        profiles = root.findall(".//publishProfile")
        profile = next((p for p in profiles if "scm." in p.attrib.get("publishUrl", "")), None)
        if profile is None and profiles:
            profile = profiles[0]
        if profile is None:
            raise SystemExit("No Azure publish profile entries were found.")

        publish_url = profile.attrib["publishUrl"]
        parsed_publish_url = urllib.parse.urlparse(
            publish_url if "://" in publish_url else f"https://{publish_url}"
        )
        deploy_host = parsed_publish_url.hostname
        if not deploy_host:
            raise SystemExit("Could not determine the Azure deployment host from the publish profile.")

        package_path = pathlib.Path(os.environ["AZURE_WEBAPP_PACKAGE_PATH"])
        if not package_path.is_absolute():
            package_path = pathlib.Path(os.environ["GITHUB_WORKSPACE"]) / package_path
        package_path = package_path.resolve()
        if not package_path.exists():
            raise SystemExit(f"Azure package path does not exist: {package_path}")

        archive_path = pathlib.Path(os.environ["RUNNER_TEMP"]) / "node-app.zip"
        with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
            for path in sorted(package_path.rglob("*")):
                if path.is_dir():
                    continue
                if any(part in {".git", ".github", "node_modules"} for part in path.parts):
                    continue
                archive.write(path, path.relative_to(package_path))

        netrc_path = pathlib.Path(os.environ["RUNNER_TEMP"]) / "azure-webapp.netrc"
        netrc_path.write_text(
            f"machine {deploy_host}\n"
            f"login {profile.attrib['userName']}\n"
            f"password {profile.attrib['userPWD']}\n",
            encoding="utf-8",
        )
        netrc_path.chmod(0o600)

        with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as github_env:
            github_env.write(f"AZURE_WEBAPP_ARCHIVE_PATH={archive_path}\n")
            github_env.write(f"AZURE_WEBAPP_DEPLOY_HOST={deploy_host}\n")
            github_env.write(f"AZURE_WEBAPP_NETRC_PATH={netrc_path}\n")
        PY

        curl --fail --silent --show-error \
          --netrc-file "$AZURE_WEBAPP_NETRC_PATH" \
          -H "Content-Type: application/zip" \
          --data-binary @"$AZURE_WEBAPP_ARCHIVE_PATH" \
          "https://${AZURE_WEBAPP_DEPLOY_HOST}/api/zipdeploy"
